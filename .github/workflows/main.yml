name: Build and Deploy - Sistema Consumidor

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/sistema-consumidor:latest .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/sistema-consumidor:latest

      - name: Add SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy all containers to EC2
        run: |
          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null ${{ secrets.USER_SERVER }}@${{ secrets.EC2_HOST }} << 'SSHEOF'

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin

            # Descargar imagenes actualizadas
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/sistema-consumidor:latest
            docker pull rabbitmq:3-management

            # Detener contenedores anteriores
            docker stop sistema-inscripcion sistema-consumidor rabbitmq || true
            docker rm sistema-inscripcion sistema-consumidor rabbitmq || true

            # Crear red Docker
            docker network create inscripcion-network || true

            # 1. Levantar RabbitMQ
            docker run -d --name rabbitmq \
              --network inscripcion-network \
              -p 5672:5672 -p 15672:15672 \
              -e RABBITMQ_DEFAULT_USER=admin \
              -e RABBITMQ_DEFAULT_PASS=admin123 \
              rabbitmq:3-management

            echo "Esperando a RabbitMQ..."
            sleep 20

            # 2. Levantar Inscripcion (Productor/BFF)
            docker run -d --name sistema-inscripcion \
              --network inscripcion-network \
              -p 8080:8080 \
              -e RABBITMQ_HOST=rabbitmq \
              -e RABBITMQ_USER=admin \
              -e RABBITMQ_PASS=admin123 \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_REGION=us-east-1 \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/sistema-inscripcion:latest

            # 3. Levantar Consumidor
            docker run -d --name sistema-consumidor \
              --network inscripcion-network \
              -p 8081:8081 \
              -e RABBITMQ_HOST=rabbitmq \
              -e RABBITMQ_USER=admin \
              -e RABBITMQ_PASS=admin123 \
              -e AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }} \
              -e AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }} \
              -e AWS_SESSION_TOKEN=${{ secrets.AWS_SESSION_TOKEN }} \
              -e AWS_REGION=us-east-1 \
              -e AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }} \
              ${{ secrets.DOCKERHUB_USERNAME }}/sistema-consumidor:latest

          SSHEOF