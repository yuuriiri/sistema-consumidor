# ============================================================
# Oracle Cloud - Autonomous Database con Wallet (Docker)
# ============================================================
spring.datasource.url=jdbc:oracle:thin:@dsy2206_tp?TNS_ADMIN=/app/wallet
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
spring.datasource.username=EMILIA
spring.datasource.password=Password123!

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.OracleDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# AWS S3
# ============================================================
aws.s3.bucket=${AWS_S3_BUCKET:sistema-inscripcion-bucket}
aws.region=${AWS_REGION:us-east-1}

# ============================================================
# Azure AD - IDaaS (OAuth2 Resource Server) - NUEVO EFT
# ============================================================
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://login.microsoftonline.com/5553fdcd-25a1-4ac0-b52e-6485ef291b9f/v2.0

# Client ID de la App Registration en Azure (usado para validar audience del JWT)
azure.app.client-id=bde8eb81-978a-44e4-bbec-9808f87649c5

# ============================================================
# RabbitMQ
# ============================================================
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=5672
spring.rabbitmq.username=${RABBITMQ_USER:admin}
spring.rabbitmq.password=${RABBITMQ_PASS:admin123}